<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Game</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- ANA MENÜ -->

<div id="menu">

<h1>✈ Plane Game</h1>

<button id="playBtn">
OYNA
</button>

</div>

<!-- UÇAK SEÇME -->

<div id="selectScreen" style="display:none;">

<h1>Başlangıç Uçağını Seç</h1>

<p>3 uçağı seç ve oyuna başla.</p>

<div id="planeSelection"></div>

<button id="startGame">
Oyuna Başla
</button>

</div>

<!-- OYUN -->

<div id="game" style="display:none;">

<div id="dayBox">

📅 Gün:
<span id="day">1</span>

</div>

<div id="goldBox">

🪙 Altın:
<span id="gold">100</span>

</div>

<div id="leftMenu">

<button id="planesButton">
Uçaklarım
</button>

<button id="marketButton">
Market
</button>

<div id="planesPanel" class="panel"></div>

<div id="marketPanel" class="panel"></div>

</div>

<div id="center">

<button id="startDay">
Günü Başlat
</button>

<button id="finishDay" style="display:none;">
Günü Bitir
</button>

<div id="events"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
